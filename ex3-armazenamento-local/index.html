<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 3: localStorage</title>
  <style>
    /* Estilos padrão para o corpo da página */
    body {
      background-color: white;
      color: black;
      transition: background-color 0.3s, color 0.3s; /* Transição suave para mudanças de cor */
    }

    /* Classe para o modo escuro */
    .dark-mode {
      background-color: black;
      color: white;
    }
  </style>
</head>
<body>
  <!-- Botão para alternar entre modo claro e escuro -->
  <button id="myButton">Modo Escuro</button>

  <!-- Script JavaScript embutido na página -->
  <script>
    // Seleciona o botão e o corpo da página
    const button = document.querySelector('#myButton');
    const body = document.body;


    const saveMode = localStorage.getItem('mode')
      if(saveMode === 'dark'){
        body.classList.add('dark-mode')
        button.textContent = 'Modo Claro'
      }

      button.addEventListener('click', () => {
        body.classList.toggle('dark-mode')
        
        if(body.classList.contains('dark-mode')){
          localStorage.setItem('mode', 'dark')
          button.textContent = "Modo Claro"
        }else{
          localStorage.setItem('mode', 'light')
          button.textContent = "Modo Escuro"
        }
      })
  </script>
</body>
</html>
